server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: pro-elite-cars-platform

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/proelite_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:janet-marketing}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false

  freemarker:
    template-loader-path: classpath:/templates/email/
    suffix: .ftl
    charset: UTF-8
    enabled: true
    cache: false
    prefer-file-system-access: false

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:lezisign@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    test-connection: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

app:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}

  brevo:
    api-key: ${BREVO_API_KEY:}
    sender-email: ${BREVO_SENDER_EMAIL:lezisign@gmail.com}
    sender-name: ${BREVO_SENDER_NAME:Pro Elite Motors}

  admin:
    email: ${ADMIN_EMAIL:admin@proelitemotors.com}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,https://preview--moments-connect-hub.lovable.app/}

  version: 1.0.0

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.mdau.proelitecars: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}